name: 🚀 Deploy RBeverything System

on:
  push:
    branches:
      - main # Production
      - sandbox # Staging/Sandbox

jobs:
  # ----------------------------------------------------------------
  # JOB 1: RUN AUTOMATED TESTS (PEST & DUSK)
  # ----------------------------------------------------------------
  run-tests:
    name: 🧪 Run Pest & Dusk Tests
    runs-on: ubuntu-latest
    
    # Tambahkan layer services MySQL untuk kompatibilitas migration production
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: rbeverything_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, mysql, pdo_mysql, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: 📦 Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: 🔄 Cache Composer Dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: 📦 Install Composer Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: 🔄 Cache NPM Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-

      - name: 🛠️ Build NPM Assets
        run: |
          npm install
          npm run build

      - name: 🗄️ Setup Environment & Database
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: 🌐 Setup Chrome Driver (For Dusk)
        run: |
          google-chrome-stable --version
          php artisan dusk:chrome-driver --detect

      - name: 🚀 Run Server & Execute Dusk + Pest Tests
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: rbeverything_testing
          DB_USERNAME: root
          DB_PASSWORD: root
          APP_URL: "http://127.0.0.1:8000"
        run: |
          php artisan migrate --force
          php artisan serve --no-reload &
          sleep 5 # Tunggu server hidup sebelum test
          php artisan test # Jalankan Pest PHP
          php artisan dusk # Jalankan Browser Test

  # ----------------------------------------------------------------
  # JOB 2: DEPLOY PROCESS (Hanya jalan jika tes sukses)
  # ----------------------------------------------------------------
  web-deploy:
    name: 🎉 Deploy Process
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # STAGE 1: INSTALL DEPENDENCIES & BUILD ASSETS
      # ----------------------------------------------------------------
      - name: 🔨 Install Dependencies & Build Assets
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      # ----------------------------------------------------------------
      # STAGE 2: CREATE ZIP ARCHIVES
      # ----------------------------------------------------------------
      - name: 📦 Create Core Archive
        run: |
          zip -r /tmp/core.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "public/*" \
            -x ".env" \
            -x ".env.*" \
            -x "*.zip"

      - name: 📦 Create Public Archive
        run: |
          cd public
          zip -r /tmp/public.zip .

      # ----------------------------------------------------------------
      # STAGE 3: UPLOAD VIA LFTP (2 files instead of ~15,000+)
      # ----------------------------------------------------------------
      - name: 📥 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # ── SANDBOX ─────────────────────────────────────────────────────
      - name: 📂 Upload Archives (Staging)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          # Write the deploy key to a temp file on the runner
          echo "${{ secrets.DEPLOY_UNZIP_KEY }}" > /tmp/deploy.key
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          # Upload the deploy key to the server home directory (outside public_html)
          put /tmp/deploy.key -o /deploy.key
          # Upload the unzip script so the server has it ready
          put public/deploy-unzip.php -o /public_html/web-sbox.rbeverything.com/deploy-unzip.php
          # Then upload the zip archives
          put /tmp/core.zip -o /projects/sandbox/core.zip
          put /tmp/public.zip -o /public_html/web-sbox.rbeverything.com/public.zip
          bye
          EOF

      # ── PRODUCTION ──────────────────────────────────────────────────
      - name: 📂 Upload Archives (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          # Write the deploy key to a temp file on the runner
          echo "${{ secrets.DEPLOY_UNZIP_KEY }}" > /tmp/deploy.key
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          # Upload the deploy key to the server home directory (outside public_html)
          put /tmp/deploy.key -o /deploy.key
          # Upload the unzip script so the server has it ready
          put public/deploy-unzip.php -o /public_html/deploy-unzip.php
          # Then upload the zip archives
          put /tmp/core.zip -o /projects/production/core.zip
          put /tmp/public.zip -o /public_html/public.zip
          bye
          EOF

      # ----------------------------------------------------------------
      # STAGE 4: TRIGGER SERVER-SIDE UNZIP
      # ----------------------------------------------------------------
      - name: 📦 Trigger Unzip (Staging)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          echo "🔓 Triggering unzip at staging..."
          RESPONSE=$(curl -G -s --connect-timeout 30 --max-time 120 --retry 2 --retry-delay 5 \
            -H 'Content-Type:' \
            --data-urlencode "key=${{ secrets.DEPLOY_UNZIP_KEY }}" \
            -w "\n%{http_code}" \
            "https://web-sbox.rbeverything.com/deploy-unzip.php")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Unzip failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: 📦 Trigger Unzip (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔓 Triggering unzip at production..."
          RESPONSE=$(curl -G -s --connect-timeout 30 --max-time 120 --retry 2 --retry-delay 5 \
            -H 'Content-Type:' \
            --data-urlencode "key=${{ secrets.DEPLOY_UNZIP_KEY }}" \
            -w "\n%{http_code}" \
            "https://rbeverything.com/deploy-unzip.php")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Unzip failed with HTTP $HTTP_CODE"
            exit 1
          fi

      # ----------------------------------------------------------------
      # STAGE 5: RUN DATABASE SEEDERS (Idempotent — safe to re-run)
      # ----------------------------------------------------------------
      - name: 🌱 Run Database Seeders (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🌱 Triggering idempotent database seeding on production..."
          RESPONSE=$(curl -s --connect-timeout 30 --max-time 120 \
            -X POST \
            -d "token=${{ secrets.DEPLOY_SECRET }}&command=db:seed" \
            -w "\n%{http_code}" \
            "https://rbeverything.com/system/emergency-command")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "📋 Seeder response (HTTP $HTTP_CODE):"
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Seeder returned HTTP $HTTP_CODE — check logs, but deployment was successful."
          else
            echo "✅ Database seeders completed successfully."
          fi
          # Non-fatal: seeder failure does not roll back a successful deploy.
          true

      - name: 🌱 Run Database Seeders (Staging)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          echo "🌱 Triggering idempotent database seeding on sandbox..."
          RESPONSE=$(curl -s --connect-timeout 30 --max-time 120 \
            -X POST \
            -d "token=${{ secrets.DEPLOY_SECRET }}&command=db:seed" \
            -w "\n%{http_code}" \
            "https://web-sbox.rbeverything.com/system/emergency-command")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "📋 Seeder response (HTTP $HTTP_CODE):"
          echo "$BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ Seeder returned HTTP $HTTP_CODE — check logs, but deployment was successful."
          else
            echo "✅ Database seeders completed successfully."
          fi
          true
