name: 🚀 Deploy RBeverything System

on:
  push:
    branches:
      - main # Production
      - sandbox # Staging/Sandbox

jobs:
  # ----------------------------------------------------------------
  # JOB 1: RUN AUTOMATED TESTS (PEST & DUSK)
  # ----------------------------------------------------------------
  run-tests:
    name: 🧪 Run Pest & Dusk Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      - name: ⚙️ Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv

      - name: 📦 Install Composer Dependencies
        run: composer install --prefer-dist --no-progress --no-suggest

      - name: 🛠️ Build NPM Assets
        run: |
          npm install
          npm run build

      - name: 🗄️ Setup Environment & Database
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate

      - name: 🌐 Setup Chrome Driver (For Dusk)
        run: |
          google-chrome-stable --version
          php artisan dusk:chrome-driver --detect

      - name: 🚀 Run Server & Execute Dusk + Pest Tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          APP_URL: "http://127.0.0.1:8000"
        run: |
          php artisan migrate --force
          php artisan serve --no-reload &
          sleep 5 # Tunggu server hidup
          php artisan test # Jalankan Pest PHP
          php artisan dusk # Jalankan Browser Test

  # ----------------------------------------------------------------
  # JOB 2: DEPLOY PROCESS (Hanya jalan jika tes sukses)
  # ----------------------------------------------------------------
  web-deploy:
    name: 🎉 Deploy Process
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # STAGE 1: INSTALL DEPENDENCIES & BUILD ASSETS
      # ----------------------------------------------------------------
      - name: 🔨 Install Dependencies & Build Assets
        run: |
          composer install --no-dev --optimize-autoloader
          npm install
          npm run build

      # ----------------------------------------------------------------
      # STAGE 2: CREATE ZIP ARCHIVES
      # ----------------------------------------------------------------
      - name: 📦 Create Core Archive
        run: |
          zip -r /tmp/core.zip . \
            -x ".git/*" \
            -x ".github/*" \
            -x "node_modules/*" \
            -x "public/*" \
            -x ".env" \
            -x ".env.*" \
            -x "*.zip"

      - name: 📦 Create Public Archive
        run: |
          cd public
          zip -r /tmp/public.zip .

      # ----------------------------------------------------------------
      # STAGE 3: UPLOAD VIA LFTP (2 files instead of ~15,000+)
      # ----------------------------------------------------------------
      - name: 📥 Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # ── SANDBOX ─────────────────────────────────────────────────────
      - name: 📂 Upload Archives (Staging)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          # Write the deploy key to a temp file on the runner
          echo "${{ secrets.DEPLOY_UNZIP_KEY }}" > /tmp/deploy.key
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          # Upload the deploy key to the server home directory (outside public_html)
          put /tmp/deploy.key -o /deploy.key
          # Upload the unzip script so the server has it ready
          put public/deploy-unzip.php -o /public_html/web-sbox.rbeverything.com/deploy-unzip.php
          # Then upload the zip archives
          put /tmp/core.zip -o /projects/sandbox/core.zip
          put /tmp/public.zip -o /public_html/web-sbox.rbeverything.com/public.zip
          bye
          EOF

      # ── PRODUCTION ──────────────────────────────────────────────────
      - name: 📂 Upload Archives (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          # Write the deploy key to a temp file on the runner
          echo "${{ secrets.DEPLOY_UNZIP_KEY }}" > /tmp/deploy.key
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" "${{ secrets.FTP_SERVER }}" <<EOF
          set ssl:verify-certificate no
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 5
          # Upload the deploy key to the server home directory (outside public_html)
          put /tmp/deploy.key -o /deploy.key
          # Upload the unzip script so the server has it ready
          put public/deploy-unzip.php -o /public_html/deploy-unzip.php
          # Then upload the zip archives
          put /tmp/core.zip -o /projects/production/core.zip
          put /tmp/public.zip -o /public_html/public.zip
          bye
          EOF

      # ----------------------------------------------------------------
      # STAGE 4: TRIGGER SERVER-SIDE UNZIP
      # ----------------------------------------------------------------
      - name: 📦 Trigger Unzip (Staging)
        if: github.ref == 'refs/heads/sandbox'
        run: |
          echo "🔓 Triggering unzip at staging..."
          RESPONSE=$(curl -G -s --connect-timeout 30 --max-time 120 --retry 2 --retry-delay 5 \
            -H 'Content-Type:' \
            --data-urlencode "key=${{ secrets.DEPLOY_UNZIP_KEY }}" \
            -w "\n%{http_code}" \
            "https://web-sbox.rbeverything.com/deploy-unzip.php")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Unzip failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: 📦 Trigger Unzip (Production)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔓 Triggering unzip at production..."
          RESPONSE=$(curl -G -s --connect-timeout 30 --max-time 120 --retry 2 --retry-delay 5 \
            -H 'Content-Type:' \
            --data-urlencode "key=${{ secrets.DEPLOY_UNZIP_KEY }}" \
            -w "\n%{http_code}" \
            "https://rbeverything.com/deploy-unzip.php")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Unzip failed with HTTP $HTTP_CODE"
            exit 1
          fi

      # ----------------------------------------------------------------
      # STAGE 5: FINALIZE (MIGRATE & CACHE)
      # ----------------------------------------------------------------
      - name: 🚀 Trigger System Updates (Migrate & Cache)
        run: |
          if [ "${{ github.ref }}" == "refs/heads/main" ]; then
             curl -G -s --connect-timeout 30 --max-time 120 -H 'Content-Type:' --data-urlencode "key=${{ secrets.DEPLOY_SECRET }}" "https://rbeverything.com/system/deploy/trigger"
          elif [ "${{ github.ref }}" == "refs/heads/sandbox" ]; then
             curl -G -s --connect-timeout 30 --max-time 120 -H 'Content-Type:' --data-urlencode "key=${{ secrets.DEPLOY_SECRET }}" "https://web-sbox.rbeverything.com/system/deploy/trigger"
          fi
